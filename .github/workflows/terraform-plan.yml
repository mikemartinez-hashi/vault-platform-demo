name: "Terraform Plan (PR)"

# Speculative plan on every PR to main. Pulls the static KV secret and issues a
# dynamic PKI cert from Vault so the plan shows the same injected values the
# apply will bake into the CI web server. Posts the plan as a PR comment.
#
# Requires (Terraform-provisioned; see `terraform output`):
#   Repo SECRETS:   VAULT_ROLE_ID, VAULT_SECRET_ID, TF_API_TOKEN
#   Repo VARIABLES: VAULT_ADDR, VAULT_NAMESPACE, VAULT_APPROLE_PATH,
#                   VAULT_KV_PATH, VAULT_KV_KEY, VAULT_PKI_ISSUE_PATH
# Plus an active backend.tf (cloud block) or TF_CLOUD_ORGANIZATION/TF_WORKSPACE.

on:
  pull_request:
    branches: [main]
    paths: ["**.tf", "**.tfvars", "templates/**"]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-plan:
    name: "Speculative Plan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: true

      - name: Retrieve Static Vault Secret (KV)
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ vars.VAULT_ADDR }}
          namespace: ${{ vars.VAULT_NAMESPACE }}
          method: approle
          path: ${{ vars.VAULT_APPROLE_PATH }}
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportToken: true
          secrets: |
            ${{ vars.VAULT_KV_PATH }} ${{ vars.VAULT_KV_KEY }} | VAULT_SECRET ;

      - name: Issue Dynamic PKI Certificate
        id: dynamic
        env:
          VAULT_ADDR: ${{ vars.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ vars.VAULT_NAMESPACE }}
        run: |
          set -euo pipefail
          common_name="gha-runner.ci.demo.internal"
          http=$(curl -s -o /tmp/vault_resp.json -w '%{http_code}' \
            -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            -H "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
            -H "Content-Type: application/json" \
            -d "{\"common_name\":\"${common_name}\",\"ttl\":\"15m\"}" \
            "${VAULT_ADDR}/v1/${{ vars.VAULT_PKI_ISSUE_PATH }}")
          if [ "$http" != "200" ]; then
            echo "::error::Vault returned HTTP $http issuing ${{ vars.VAULT_PKI_ISSUE_PATH }}"
            cat /tmp/vault_resp.json; echo
            exit 1
          fi
          resp=$(cat /tmp/vault_resp.json)
          private_key=$(echo "$resp" | jq -r '.data.private_key')
          serial=$(echo "$resp"      | jq -r '.data.serial_number')
          expiration=$(echo "$resp"  | jq -r '.data.expiration')
          expires_utc=$(date -u -d "@${expiration}" '+%Y-%m-%d %H:%M:%S UTC')
          echo "::add-mask::$private_key"
          echo "Vault issued dynamic cert — serial=$serial expires=$expires_utc"
          {
            echo "common_name=${common_name}"
            echo "serial=${serial}"
            echo "expiration=${expires_utc}"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -var="github_run_id=$GITHUB_RUN_ID" \
            -var="github_sha=$GITHUB_SHA" \
            -var="github_actor=$GITHUB_ACTOR" \
            -var="vault_ci_secret=${{ steps.vault.outputs.VAULT_SECRET }}" \
            -var="vault_ci_cert_common_name=${{ steps.dynamic.outputs.common_name }}" \
            -var="vault_ci_cert_serial=${{ steps.dynamic.outputs.serial }}" \
            -var="vault_ci_cert_expiration=${{ steps.dynamic.outputs.expiration }}" \
            2>&1 | tee /tmp/tfplan.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let planOutput = '';
            try { planOutput = fs.readFileSync('/tmp/tfplan.txt', 'utf8').trim(); } catch (e) { planOutput = ''; }
            const runUrlMatch = planOutput.match(/https:\/\/app\.terraform\.io\/app\/[^\s]+\/runs\/run-[^\s]+/);
            const runUrl = runUrlMatch ? runUrlMatch[0] : null;
            const MAX_CHARS = 60000;
            let planDisplay = planOutput || '_No plan output captured (HCP Terraform may stream status only)._';
            if (planOutput.length > MAX_CHARS) planDisplay = planOutput.slice(0, MAX_CHARS) + `\n\n... [truncated at ${MAX_CHARS} chars]`;
            const runLink = runUrl ? `\n\n> 🔗 **[View full run in HCP Terraform](${runUrl})**` : `\n\n> 💡 Open [HCP Terraform](https://app.terraform.io) for the full plan.`;
            const output = [
              `#### Terraform Init: \`${{ steps.init.outcome }}\``,
              `#### Terraform Validate: \`${{ steps.validate.outcome }}\``,
              `#### Terraform Plan: \`${{ steps.plan.outcome }}\``,
              runLink, ``,
              `<details><summary>Show Plan Output</summary>`, ``,
              '```terraform', planDisplay, '```',
              `</details>`, ``,
              `*Triggered by @${{ github.actor }} — pulled KV secret + issued PKI cert from HCP Vault*`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
